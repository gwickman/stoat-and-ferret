name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      gui: ${{ steps.filter.outputs.gui }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'rust/**'
              - 'tests/**'
              - 'scripts/**'
              - 'alembic/**'
              - 'pyproject.toml'
              - 'Cargo.toml'
              - 'uv.lock'
              - 'Dockerfile'
              - '.github/workflows/**'
            gui:
              - 'gui/**'
              - '.github/workflows/**'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Verify migrations reversible
        run: |
          uv run alembic -x sqlalchemy.url=sqlite:///:memory: upgrade head
          uv run alembic -x sqlalchemy.url=sqlite:///:memory: downgrade base
          uv run alembic -x sqlalchemy.url=sqlite:///:memory: upgrade head

      - name: Rust fmt
        run: cargo fmt --manifest-path rust/stoat_ferret_core/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path rust/stoat_ferret_core/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path rust/stoat_ferret_core/Cargo.toml

      - name: Build Python module
        run: uv run maturin develop

      - name: Verify module import
        run: uv run python -c "from stoat_ferret_core import health_check; print(health_check())"

      - name: Verify stubs exist
        run: test -f src/stoat_ferret_core/_core.pyi
        shell: bash

      - name: Verify stub completeness
        run: uv run python scripts/verify_stubs.py

      - name: Python lint
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Python types
        run: uv run mypy src/

      - name: Python tests
        run: uv run pytest tests/ -v --cov=src --cov-fail-under=80

  rust-coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust coverage (lcov)
        run: >
          cargo llvm-cov
          --manifest-path rust/stoat_ferret_core/Cargo.toml
          --lib --tests
          --lcov --output-path rust-lcov.info
          --fail-under-lines 75

      - name: Filter builder coverage (>95% per module)
        run: |
          cargo llvm-cov \
            --manifest-path rust/stoat_ferret_core/Cargo.toml \
            --lib --tests --json \
          | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          files = data.get('data', [{}])[0].get('files', [])
          failed = False
          for f in sorted(files, key=lambda x: x['filename']):
              fn = f['filename']
              if '/src/ffmpeg/' not in fn:
                  continue
              lines = f['summary']['lines']
              covered = lines['covered']
              total = lines['count']
              pct = (covered / total * 100) if total > 0 else 0
              status = 'PASS' if pct >= 95 else 'FAIL'
              print(f'{status} {fn}: {covered}/{total} = {pct:.1f}%')
              if pct < 95:
                  failed = True
          if failed:
              print('ERROR: One or more src/ffmpeg/ modules below 95% line coverage')
              sys.exit(1)
          print('All src/ffmpeg/ modules at or above 95% line coverage')
          "

      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: rust-lcov.info

  frontend:
    needs: changes
    if: needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: gui

      - name: Check generated types are up-to-date
        run: |
          cd gui && npm run generate:types
          git diff --exit-code -- gui/src/generated/api-types.ts

      - name: Build
        run: npm run build
        working-directory: gui

      - name: Test
        run: npx vitest run
        working-directory: gui

  e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        run: uv sync

      - name: Build Python module
        run: uv run maturin develop

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: gui

      - name: Build frontend
        run: npm run build
        working-directory: gui

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npm ls @playwright/test --json | python -c "import sys,json; print(json.load(sys.stdin)['dependencies']['@playwright/test']['version'])")" >> "$GITHUB_OUTPUT"
        working-directory: gui

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        working-directory: gui

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: gui

      - name: Initialize database
        run: |
          mkdir -p data
          uv run alembic -x sqlalchemy.url=sqlite:///data/stoat.db upgrade head

      - name: Run E2E tests
        run: npx playwright test
        working-directory: gui

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gui/playwright-report/
          retention-days: 7

  smoke-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build Python module
        run: uv run maturin develop

      - name: Run smoke tests
        run: uv run pytest tests/smoke/ -v --timeout=120 --no-cov

  uat:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pip

      - name: Build Python module
        run: uv run maturin develop

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: gui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: gui

      - name: Build frontend
        run: npm run build
        working-directory: gui

      - name: Install UAT dependencies
        run: uv pip install -e ".[uat]"

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(uv run python -c "from importlib.metadata import version; print(version('playwright'))")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: uv run playwright install-deps chromium

      - name: Install Node.js Playwright browsers (J604 uses npx playwright test)
        run: npx playwright install chromium
        working-directory: gui

      - name: Run UAT suite
        # Budget: ~2m pre-build + ~1m server start + ~5m journeys = ~8m; 10m allows margin
        run: uv run python scripts/uat_runner.py --headless --no-build

      - name: Upload UAT evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uat-evidence
          path: uat-evidence/
          retention-days: 7

  openapi-validation:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Validate OpenAPI spec
        run: uv run openapi-spec-validator gui/openapi.json

  openapi-freshness:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build Python module
        run: uv run maturin develop

      - name: Check OpenAPI spec freshness
        run: uv run python scripts/check_openapi_freshness.py

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.gui == 'true'
    env:
      # Size threshold in MB: ceil(baseline_mb * 1.10). Update after first CI run with actual size.
      # Planning estimate (330 MB) was a ceiling before FFmpeg was excluded from runtime stage.
      DOCKER_IMAGE_SIZE_THRESHOLD_MB: "400"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: stoat-ferret:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Measure image size and enforce threshold
        # Size measurement: docker image inspect returns bytes; converts to MB.
        # Threshold read from DOCKER_IMAGE_SIZE_THRESHOLD_MB (job env); fails loudly if unset.
        # Calculate next threshold: ceil(measured_mb * 1.10) after reviewing CI logs.
        run: |
          SIZE_BYTES=$(docker image inspect stoat-ferret:latest --format='{{.Size}}')
          SIZE_MB=$(echo "scale=1; $SIZE_BYTES / 1000000" | bc)
          THRESHOLD_MB="${DOCKER_IMAGE_SIZE_THRESHOLD_MB:?DOCKER_IMAGE_SIZE_THRESHOLD_MB must be set}"
          echo "Docker image size: ${SIZE_MB}MB (threshold: ${THRESHOLD_MB}MB)"
          if (( $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) )); then
            echo "Image size ${SIZE_MB}mb exceeds threshold ${THRESHOLD_MB}mb"
            exit 1
          fi
          echo "Image size OK: ${SIZE_MB}MB <= ${THRESHOLD_MB}MB"

  nul-pattern-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Windows nul anti-pattern
        run: |
          BADPAT=$(printf '%s%s' '> ' 'nul')
          if grep -r -I -F "$BADPAT" .github/workflows/ scripts/ 2>/dev/null; then
            echo "Windows nul anti-pattern detected. Use /dev/null instead. See AGENTS.md § Windows."
            exit 1
          fi

  ci-a11y:
    name: Accessibility Audit (axe-core + E2E)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/stoat_ferret_core

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        run: uv sync

      - name: Build Python module
        run: uv run maturin develop

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: gui

      - name: Build frontend
        run: npm run build
        working-directory: gui

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npm ls @playwright/test --json | python -c "import sys,json; print(json.load(sys.stdin)['dependencies']['@playwright/test']['version'])")" >> "$GITHUB_OUTPUT"
        working-directory: gui

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        working-directory: gui

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: gui

      - name: Initialize database
        run: |
          mkdir -p data
          uv run alembic -x sqlalchemy.url=sqlite:///data/stoat.db upgrade head

      - name: Run accessibility E2E tests
        run: npx playwright test e2e/accessibility.spec.ts e2e/keyboard-navigation.spec.ts
        working-directory: gui

      - name: Upload accessibility report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: gui/playwright-report/
          retention-days: 7

  ci-status:
    runs-on: ubuntu-latest
    needs: [changes, test, rust-coverage, frontend, e2e, ci-a11y, smoke-tests, uat, openapi-freshness, openapi-validation, docker-build, nul-pattern-check]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.nul-pattern-check.result }}" == "failure" ]]; then
            echo "Windows nul anti-pattern check failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Tests failed"
            exit 1
          fi
          if [[ "${{ needs.rust-coverage.result }}" == "failure" ]]; then
            echo "Rust coverage failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "Frontend failed"
            exit 1
          fi
          if [[ "${{ needs.e2e.result }}" == "failure" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          if [[ "${{ needs.ci-a11y.result }}" == "failure" ]]; then
            echo "Accessibility audit failed"
            exit 1
          fi
          if [[ "${{ needs.smoke-tests.result }}" == "failure" ]]; then
            echo "Smoke tests failed"
            exit 1
          fi
          if [[ "${{ needs.uat.result }}" == "failure" || "${{ needs.uat.result }}" == "cancelled" ]]; then
            echo "UAT tests failed"
            exit 1
          fi
          if [[ "${{ needs.openapi-freshness.result }}" == "failure" ]]; then
            echo "OpenAPI freshness check failed"
            exit 1
          fi
          if [[ "${{ needs.openapi-validation.result }}" == "failure" ]]; then
            echo "OpenAPI spec validation failed"
            exit 1
          fi
          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "Docker build failed"
            exit 1
          elif [[ "${{ needs.docker-build.result }}" == "skipped" ]]; then
            echo "Docker build skipped (docs-only PR)"
          else
            echo "Docker build passed"
          fi
          echo "CI passed"
