name: SPDX License Header Gate

on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.rs'

jobs:
  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check SPDX license headers
        run: python scripts/add_license_headers.py --check
