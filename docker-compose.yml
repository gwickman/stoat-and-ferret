services:
  app:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
    healthcheck:
      # Use /health/live (not /health/ready) for Docker healthchecks: liveness checks
      # are faster (no subsystem probes) and Docker's restart policy only needs to know
      # if the process is responsive. /health/ready is for orchestrators (k8s readiness
      # probes, deploy_smoke.sh) that need to know if all services are operational.
      test: ["CMD", "curl", "-f", "http://localhost:8765/health/live"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

  test:
    build:
      context: .
      dockerfile: Dockerfile.ci
    # Mount source for faster iteration — edits are reflected without rebuild.
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./scripts:/app/scripts:ro
    # Default command runs the full test suite.
    # Override with: docker compose run test uv run pytest -k "test_name"
    command: ["uv", "run", "pytest", "-v"]
