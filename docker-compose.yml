services:
  app:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health/live"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

  test:
    build:
      context: .
      dockerfile: Dockerfile.ci
    # Mount source for faster iteration — edits are reflected without rebuild.
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./scripts:/app/scripts:ro
    # Default command runs the full test suite.
    # Override with: docker compose run test uv run pytest -k "test_name"
    command: ["uv", "run", "pytest", "-v"]
